# Render Blueprint - Backend Senegram + MySQL Aiven
# Renseigne MYSQL_URL avec le Service URI Aiven.

services:
  - type: web
    name: senegram-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    preDeployCommand: npm run db:init
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://TON_APP.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: MYSQL_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_CA_CERT
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:sarrfallou267@gmail.com
      # S3-compatible storage (R2, Supabase, AWS S3, etc.)
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: "auto"
      - key: S3_PUBLIC_URL
        sync: false
